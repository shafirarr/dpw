<!DOCTYPE html>
<html>
<head>
<title>Image Map</title>
</head>
<body>

<h2>Image Map (Klik Gambar)</h2>

<p>Klik bagian gambar untuk membuka link tertentu.</p>

<img src="https://via.placeholder.com/300x300" usemap="#mapku" width="300" height="300">

<map name="mapku">
    <!-- kiri atas -->
    <area shape="rect" coords="0,0,150,150" href="https://www.google.com" target="_blank">

    <!-- kanan bawah -->
    <area shape="rect" coords="150,150,300,300" href="https://www.youtube.com" target="_blank">
</map>

<p>
Kesimpulan: Image map memungkinkan satu gambar memiliki beberapa area klik 
yang mengarah ke link berbeda.
</p>

</body>
</html>
