<!DOCTYPE html>
<html>
<body>

<form>
    <input type="radio" name="jk" value="Laki-laki"> Laki-laki
    <input type="radio" name="jk" value="Perempuan"> Perempuan
    <button type="button" onclick="cek()">Cek</button>
</form>

<script>
function cek() {
    let pilihan = document.querySelector('input[name="jk"]:checked');
    if (pilihan) {
        alert("Pilihan: " + pilihan.value);
    } else {
        alert("Belum memilih");
    }
}
</script>

</body>
</html>
