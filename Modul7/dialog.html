<!DOCTYPE html>
<html>
<head>
<link rel="stylesheet" href="https://code.jquery.com/ui/1.13.2/themes/base/jquery-ui.css">
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://code.jquery.com/ui/1.13.2/jquery-ui.js"></script>
</head>
<body>

<button id="btn">Buka Dialog</button>

<div id="dialog" title="Tentang Aplikasi">
    <p>Nama: Shafira Rahmaningtyas</p>
    <p>Modul: Praktikum JavaScript</p>
    <p>Fungsi: Menampilkan dialog menggunakan jQuery</p>
</div>

<script>
$("#dialog").hide();

$("#btn").click(function(){
    $("#dialog").dialog();
});
</script>

</body>
</html>
