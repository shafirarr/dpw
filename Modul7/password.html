<!DOCTYPE html>
<html>
<body>

Password: <input type="password" id="pass">
<button onclick="cekPass()">Cek</button>

<script>
function cekPass() {
    let pass = document.getElementById("pass").value;
    if (pass == "12345") {
        alert("Password benar");
    } else {
        alert("Password salah");
    }
}
</script>

</body>
</html>
