<!DOCTYPE html>
<html>
<body>

<form onsubmit="return validasi()">
    Nama: <input type="text" id="nama">
    <button type="submit">Submit</button>
</form>

<script>
function validasi() {
    let nama = document.getElementById("nama").value;
    if (nama == "") {
        alert("Nama tidak boleh kosong!");
        return false;
    }
}
</script>

</body>
</html>
