<!DOCTYPE html>
<html>
<head>
    <title>Belajar Simple Selector</title>
    <style>
        p {
            border: 2px solid black;
            padding: 10px;
        }

        .bg1 { background-color: rgb(79, 191, 228); }
        .bg2 { background-color: rgb(119, 224, 119); }
        .bg3 { background-color: rgb(192, 48, 48); }
    </style>
</head>
<body>
    <p class="bg1">Paragraf 1</p>
    <p class="bg2">Paragraf 2</p>
    <p class="bg3">Paragraf 3</p>
</body>
</html>
