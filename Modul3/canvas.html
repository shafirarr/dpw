<!DOCTYPE html>
<html>
<body>

<h2>Canvas HTML5</h2>

<canvas id="myCanvas" width="300" height="200" style="border:1px solid black;"></canvas>

<script>
var c = document.getElementById("myCanvas");
var ctx = c.getContext("2d");

// contoh gambar kotak
ctx.fillStyle = "blue";
ctx.fillRect(50, 50, 150, 100);
</script>

<p>Silakan eksplorasi canvas dengan JavaScript.</p>

<p><i>Kesimpulan: Canvas digunakan untuk menggambar grafik secara dinamis.</i></p>

</body>
</html>
