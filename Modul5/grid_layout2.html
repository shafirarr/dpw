<!DOCTYPE html>
<html>
<head>
<style>
.grid-container {
    display: grid;
    grid-template-columns: auto auto auto auto;
    gap: 10px;
}

.grid-container div {
    background-color: lightgreen;
    padding: 20px;
}
</style>
</head>
<body>

<div class="grid-container">
    <div>1</div><div>2</div><div>3</div><div>4</div>
</div>

<p>Kesimpulan: Grid bisa diatur ukuran kolomnya fleksibel.</p>

</body>
</html>
