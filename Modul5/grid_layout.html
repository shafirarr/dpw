<!DOCTYPE html>
<html>
<head>
<style>
.tempat_grid {
    display: grid;
    grid-template-columns: auto auto auto;
    gap: 10px;
}

.tempat_grid div {
    background-color: lightblue;
    padding: 20px;
}
</style>
</head>
<body>

<div class="tempat_grid">
    <div>1</div><div>2</div><div>3</div>
    <div>4</div><div>5</div><div>6</div>
</div>

<p>Kesimpulan: Grid membagi layout menjadi baris dan kolom.</p>

</body>
</html>
